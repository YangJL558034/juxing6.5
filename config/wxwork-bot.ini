; ============================================
; 企业微信智能机器人配置文件
; ============================================
; 
; 说明：
; - 此文件用于配置企业微信机器人的基本参数
; - 建议仅用于开发环境，生产环境请使用环境变量
; - 修改配置后需要重启机器人生效
;

[wework]
; 企业微信机器人 Bot ID
; 在企业微信管理后台 -> 应用管理 -> 找到对应的应用机器人 -> 查看详情
; 格式：ww 开头的字符串，例如：ww1234567890abcdef
bot_id = 

; 机器人 Secret
; 在企业微信管理后台 -> 应用管理 -> 找到对应的应用机器人 -> 查看详情 -> 获取Secret
; 注意：请妥善保管 Secret，不要泄露
bot_secret = 

[api]
; 生成管理模块 API 地址
; 填写你的生成管理模块的 POST 接口地址
; 机器人会调用此接口处理用户消息
; 示例：http://localhost:5000/api/generate
api_url = http://localhost:5000/api/generate

; API 鉴权 Token（可选）
; 如果生成管理接口需要鉴权，在此填写 Token
; 机器人会在请求头中添加 Authorization: Bearer {token}
auth_token = 

[system]
; 日志级别：debug, info, warn, error
log_level = info

; 日志文件路径（可选，留空则仅输出到控制台）
; log_file = ./logs/wxwork-bot.log

; API 调用超时时间（毫秒）
api_timeout = 30000

; 最大重试次数
max_retries = 3
